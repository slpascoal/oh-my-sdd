site_name: oh-my-sdd
site_description: Spec-Driven Development, enforced by a global orchestrator + 5 Claude Code skills.
site_url: https://slpascoal.github.io/oh-my-sdd/
repo_url: https://github.com/slpascoal/oh-my-sdd
repo_name: slpascoal/oh-my-sdd
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: pt
          name: Português
          build: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
  - Architecture:
      - Overview: architecture/overview.md
      - Skills Reference: architecture/skills.md
  - SDD Concepts:
      - What is SDD?: concepts/what-is-sdd.md
      - Goal of SDD: concepts/goal.md
      - Writing Effective Specs: concepts/spec-best-practices.md
      - Practical Spec Example: concepts/spec-example.md
      - Writing an Effective Constitution: concepts/constitution-best-practices.md
      - Practical Constitution Example: concepts/constitution-example.md
  - CLI Reference: cli.md
  - Safety & Data: safety.md
